<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Tailwind Hero Section</title>
</head>
<body>

    <div class="relative bg-cover bg-center h-screen flex items-center justify-center" style="background-image: url('https://images.unsplash.com/photo-1550439062-609e1531270e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');">
        
        <div class="absolute inset-0 bg-black opacity-60"></div>
        
        <div class="relative z-10 text-center px-6 max-w-4xl mx-auto">
            <h1 class="text-4xl md:text-6xl font-extrabold text-white mb-6 leading-tight">
                Build the Future with Tailwind
            </h1>
            <p class="text-lg md:text-xl text-gray-300 mb-10">
                A utility-first CSS framework packed with classes that can be composed to build any design, directly in your markup.
            </p>
            
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-lg shadow-lg transition duration-300">
                    Get Started
                </button>
                <button class="bg-transparent border-2 border-white hover:bg-white hover:text-indigo-900 text-white font-semibold py-3 px-8 rounded-lg transition duration-300">
                    Learn More
                </button>
            </div>
        </div>
    </div>

</body>
</html>
